<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTS Budget- & Renditerechner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="hero">
  <img src="logo.png" class="logo" alt="KTS Logo">
  <h1>Budget- & Renditerechner</h1>
  <p>Berechnen Sie Ihr Gesamtbudget für Ihre Immobilie in Nordzypern.</p>
  <img src="header.png" class="heroimg" alt="Nordzypern">
</header>

<main class="card">
<label>Kaufpreis (€)</label>
<input id="price" type="number" placeholder="250000">

<label>Immobilienart</label>
<select id="type">
<option>Neubau</option>
<option>Bestandsimmobilie</option>
</select>

<label>Nutzung</label>
<select id="use">
<option>Kapitalanlage</option>
<option>Eigennutzung</option>
</select>

<label>Erwartete Monatsmiete (optional)</label>
<input id="rent" type="number" placeholder="1200">

<button onclick="calc()">Budget berechnen</button>

<div id="result"></div>
</main>

<footer>
<p>Hinweis: Die Berechnung dient ausschließlich einer ersten Orientierung.</p>
<a class="wa" href="#">Beratung per WhatsApp</a>
</footer>

<script src="script.js"></script>
</body>
</html>
